$kind: http-request
name: Get My Maintenance Tasks (GET /api/maintenance)
description: Lấy danh sách công việc bảo trì của user hiện tại.
url: "{{base_url}}/api/maintenance/my-tasks"
method: GET
headers:
  Authorization: Bearer {{jwt_user}}
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is array", function () {
          var json = pm.response.json();
          pm.expect(json).to.be.an('array');
      });
    language: text/javascript
order: 2000

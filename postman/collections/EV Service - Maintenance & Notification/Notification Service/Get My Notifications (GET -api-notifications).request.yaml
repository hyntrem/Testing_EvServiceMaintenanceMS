$kind: http-request
name: Get My Notifications (GET /api/notifications)
description: Lấy danh sách thông báo của user hiện tại.
url: "{{base_url}}/api/notifications/my-notifications?unread_only=false"
method: GET
headers:
  Authorization: Bearer {{jwt_user}}
queryParams:
  unread_only: "false"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is array", function () {
          var json = pm.response.json();
          pm.expect(json).to.be.an('array');
      });
    language: text/javascript
order: 1000

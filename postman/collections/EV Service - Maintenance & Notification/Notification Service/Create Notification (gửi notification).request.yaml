$kind: http-request
description: Internal API để tạo notification (dùng X-Internal-Token).
url: "{{base_url}}/internal/notifications/create"
method: POST
headers:
  Content-Type: application/json
  X-Internal-Token: "{{internal_token}}"
body:
  type: text
  content: |-
    {
      "user_id": 1,
      "title": "Maintenance Scheduled",
      "message": "Your EV maintenance has been scheduled.",
      "notification_type": "maintenance",
      "channel": "in_app",
      "priority": "medium",
      "related_entity_type": "maintenance_task",
      "related_entity_id": 1,
      "metadata": {
        "booking_id": 1,
        "task_id": 1
      }
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });

      pm.test("Notification created", function () {
          var json = pm.response.json();
          pm.expect(json).to.have.property('notification');
          pm.expect(json.notification).to.have.property('id');
      });
    language: text/javascript
order: 2000
